<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}COFINANCE CI{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #0f4c81;
            --primary-dark: #0a3560;
            --primary-light: #e8f1fb;
            --accent: #f0a500;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --border: #e2e8f0;
            --shadow: 0 8px 32px rgba(15,76,129,0.08);
            --sidebar-width: 260px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .logo-box {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
        }

        .brand-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
        }
        .brand-sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        .nav-links {
            padding: 20px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .nav-item i {
            width: 20px;
            height: 20px;
        }

        .sidebar-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-mini-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
        }

        .user-role {
            font-size: 11px;
            color: var(--text-muted);
        }

        .btn-logout {
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .btn-logout:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 32px 48px;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* CARDS */
        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* UTILS */
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success { background: #dcfce7; color: #166534; }
        .badge-warning { background: #fef9c3; color: #854d0e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #e0f2fe; color: #075985; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">CF</div>
            <div>
                <div class="brand-name">COFINANCE CI</div>
                <div class="brand-sub">Portail Web</div>
            </div>
        </div>

        <nav class="nav-links">
            <a href="{% url 'home' %}" class="nav-item" id="nav-dashboard">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="{% url 'credits_view' %}" class="nav-item" id="nav-credits">
                <i data-lucide="wallet"></i> Mes Crédits
            </a>
            <a href="{% url 'remboursements_view' %}" class="nav-item" id="nav-remboursements">
                <i data-lucide="history"></i> Remboursements
            </a>
            <a href="{% url 'assurances_view' %}" class="nav-item" id="nav-assurances">
                <i data-lucide="shield-check"></i> Assurances
            </a>
            <a href="{% url 'chat' %}" class="nav-item" id="nav-chat">
                <i data-lucide="message-square"></i> Support Chat
            </a>
            <a href="/admin/" target="_blank" class="nav-item" id="nav-admin" style="display:none; margin-top: auto; color: var(--accent);">
                <i data-lucide="settings"></i> Accès Admin
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-mini-profile">
                <div class="user-avatar" id="sidebar-avatar">?</div>
                <div>
                    <div class="user-name" id="sidebar-name">Chargement...</div>
                    <div class="user-role" id="sidebar-role">...</div>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()" title="Se déconnecter">
                <i data-lucide="log-out"></i>
            </button>
        </div>
    </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Init Lucide icons
        lucide.createIcons();

        // API Base URL
        const API_BASE = 'http://127.0.0.1:8000/api';

        // Check authentication
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = "{% url 'login' %}";
        }

        // Fetch User Profile
        async function fetchProfile() {
            try {
                const response = await fetch(`${API_BASE}/accounts/profile/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                const user = await response.json();
                
                // Update sidebar
                const name = user.first_name ? `${user.first_name} ${user.last_name}` : user.username;
                document.getElementById('sidebar-name').textContent = name;
                document.getElementById('sidebar-avatar').textContent = name.charAt(0).toUpperCase();
                
                let roleLabel = 'Client';
                if(user.role === 'agent') roleLabel = 'Agent';
                if(user.role === 'admin') roleLabel = 'Administrateur';
                document.getElementById('sidebar-role').textContent = roleLabel;

                // Show admin link if user is admin
                if (user.role === 'admin') {
                    document.getElementById('nav-admin').style.display = 'flex';
                }

                // Make user available globally
                window.currentUser = user;

                // Dispatch event so other scripts know user is loaded
                document.dispatchEvent(new Event('userLoaded'));

            } catch (e) {
                console.error("Error fetching profile", e);
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = "{% url 'login' %}";
        }

        // Start
        fetchProfile();

        // Active link highlighting
        const path = window.location.pathname;
        if(path === '/') document.getElementById('nav-dashboard').classList.add('active');
        if(path.includes('/credits')) document.getElementById('nav-credits').classList.add('active');
        if(path.includes('/remboursements')) document.getElementById('nav-remboursements').classList.add('active');
        if(path.includes('/assurances')) document.getElementById('nav-assurances').classList.add('active');
        if(path.includes('/chat')) document.getElementById('nav-chat').classList.add('active');

        // Helper fetch function with auth
        async function apiFetch(endpoint, options = {}) {
            const headers = {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
                ...options.headers
            };
            return fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
