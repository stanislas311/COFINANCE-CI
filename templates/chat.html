<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COFINANCE CI - Support Client</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #0f4c81;
      --primary-dark: #0a3560;
      --primary-light: #e8f1fb;
      --accent: #f0a500;
      --bg: #f4f6f9;
      --white: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e2e8f0;
      --bubble-me: #0f4c81;
      --bubble-other: #ffffff;
      --shadow: 0 4px 24px rgba(15,76,129,0.10);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      background: var(--primary);
      color: white;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      color: white;
      letter-spacing: 0.5px;
    }

    .header-title { font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
    .header-sub { font-size: 11px; opacity: 0.65; margin-top: 1px; }

    .header-right { font-size: 12px; opacity: 0.7; }

    /* LOGIN */
    #connexion-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 40px 36px;
      width: 400px;
      box-shadow: var(--shadow);
    }

    .login-card h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      background: #fafbfc;
    }

    .form-group input:focus {
      border-color: var(--primary);
      background: white;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover { background: var(--primary-dark); }
    .btn-login:active { transform: scale(0.99); }
    .btn-login:disabled { background: #a0aec0; cursor: not-allowed; }

    #error-msg {
      color: #e53e3e;
      font-size: 13px;
      margin-top: 12px;
      padding: 10px 12px;
      background: #fff5f5;
      border-radius: 6px;
      border-left: 3px solid #e53e3e;
      display: none;
    }

    /* CHAT */
    #chat-panel {
      display: none;
      flex: 1;
      flex-direction: column;
      max-width: 860px;
      width: 100%;
      margin: 20px auto;
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    #chat-header {
      background: var(--primary);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .chat-header-left { display: flex; align-items: center; gap: 12px; }

    .agent-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .chat-header-info .name { font-size: 15px; font-weight: 600; }
    .chat-header-info .status {
      font-size: 12px;
      opacity: 0.75;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #48bb78;
      display: inline-block;
    }

    #conv-info {
      padding: 10px 24px;
      background: var(--primary-light);
      font-size: 12px;
      color: var(--primary);
      border-bottom: 1px solid #cfe2f7;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #conv-info svg { flex-shrink: 0; }

    #ws-status {
      font-size: 12px;
      padding: 6px 24px;
      background: #fffbeb;
      color: #92400e;
      border-bottom: 1px solid #fde68a;
      display: none;
      align-items: center;
      gap: 6px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: var(--bg);
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }

    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 8px;
    }

    .msg-group.moi { align-items: flex-end; }
    .msg-group.autre { align-items: flex-start; }

    .msg-sender {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
      padding: 0 4px;
      font-weight: 600;
    }

    .message {
      max-width: 68%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    .message.moi {
      background: var(--bubble-me);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.autre {
      background: var(--bubble-other);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 4px;
    }

    .date-separator {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin: 12px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .date-separator::before,
    .date-separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    #typing-indicator {
      font-size: 12px;
      color: var(--text-muted);
      padding: 6px 24px;
      min-height: 28px;
      background: var(--bg);
      font-style: italic;
      flex-shrink: 0;
    }

    #input-zone {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      padding: 11px 18px;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      color: var(--text);
    }

    #msg-input:focus { border-color: var(--primary); }

    #btn-send {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #btn-send:hover { background: var(--primary-dark); }
    #btn-send:active { transform: scale(0.95); }

    #btn-send svg { width: 18px; height: 18px; fill: white; }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="header-logo">CF</div>
    <div>
      <div class="header-title">COFINANCE CI</div>
      <div class="header-sub">Plateforme de microfinance</div>
    </div>
  </div>
  <div class="header-right">Support client en temps reel</div>
</header>

<div id="connexion-panel">
  <div class="login-card">
    <h2>Acceder au support</h2>
    <p>Connectez-vous pour rejoindre une conversation</p>
    <div class="form-group">
      <label>Nom d'utilisateur</label>
      <input type="text" id="username" placeholder="ex: cliente_adjoua" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password">
    </div>
    <div class="form-group">
      <label>ID de conversation</label>
      <input type="number" id="conv-id" value="1" min="1">
    </div>
    <button class="btn-login" id="btn-connexion" onclick="seConnecter()">Se connecter</button>
    <p id="error-msg"></p>
  </div>
</div>

<div id="chat-panel">
  <div id="chat-header">
    <div class="chat-header-left">
      <div class="agent-avatar" id="avatar-initiale">S</div>
      <div class="chat-header-info">
        <div class="name" id="header-name">Support COFINANCE CI</div>
        <div class="status">
          <span class="status-dot"></span>
          <span>Agent disponible</span>
        </div>
      </div>
    </div>
    <div style="font-size:12px;opacity:0.7;" id="header-conv-id">Conversation #1</div>
  </div>

  <div id="conv-info">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="conv-info-text"></span>
  </div>

  <div id="ws-status">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M1 6s4-4 11-4 11 4 11 4"/><path d="M1 12s4-4 11-4 11 4 11 4"/>
    </svg>
    Reconnexion en cours...
  </div>

  <div id="messages">
    <div class="date-separator">Aujourd'hui</div>
  </div>

  <div id="typing-indicator"></div>

  <div id="input-zone">
    <input type="text" id="msg-input" placeholder="Ecrivez votre message..." onkeydown="handleKey(event)">
    <button id="btn-send" onclick="envoyerMessage()" title="Envoyer">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  let token = null;
  let userId = null;
  let ws = null;
  let convId = null;
  let typingTimeout = null;

  async function seConnecter() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    convId = parseInt(document.getElementById('conv-id').value.trim());
    const erreur = document.getElementById('error-msg');
    const btn = document.getElementById('btn-connexion');

    if (!username || !password || !convId) {
      erreur.textContent = 'Tous les champs sont obligatoires.';
      erreur.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Connexion...';
    erreur.style.display = 'none';

    try {
      const res = await fetch('http://127.0.0.1:8000/api/accounts/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (!res.ok) throw new Error('Identifiants incorrects.');
      const data = await res.json();
      token = data.access;

      const profileRes = await fetch('http://127.0.0.1:8000/api/accounts/profile/', {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      const profile = await profileRes.json();
      userId = profile.id;

      const initiale = (profile.first_name || profile.username || 'U')[0].toUpperCase();
      document.getElementById('avatar-initiale').textContent = initiale;
      document.getElementById('header-name').textContent =
        `${profile.first_name} ${profile.last_name}`.trim() || profile.username;
      document.getElementById('header-conv-id').textContent = `Conversation #${convId}`;
      document.getElementById('conv-info-text').textContent =
        `Connecte en tant que : ${profile.first_name} ${profile.last_name} (${profile.role})`;

      await chargerHistorique();
      ouvrirWebSocket();

      document.getElementById('connexion-panel').style.display = 'none';
      const chatPanel = document.getElementById('chat-panel');
      chatPanel.style.display = 'flex';
      document.getElementById('msg-input').focus();

    } catch (e) {
      erreur.textContent = e.message;
      erreur.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    }
  }

  async function chargerHistorique() {
    const res = await fetch(
      `http://127.0.0.1:8000/api/support/conversations/${convId}/messages/`,
      { headers: { 'Authorization': `Bearer ${token}` } }
    );
    const messages = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '<div class="date-separator">Historique</div>';
    messages.forEach(m => {
      afficherMessage(m.contenu, m.expediteur === userId, m.expediteur_nom, m.timestamp);
    });
    if (messages.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'text-align:center;color:#a0aec0;font-size:13px;margin:32px 0;';
      empty.textContent = 'Aucun message. Demarrez la conversation.';
      container.appendChild(empty);
    }
  }

  function ouvrirWebSocket() {
    ws = new WebSocket(`ws://127.0.0.1:8000/ws/support/${convId}/`);

    ws.onopen = () => {
      document.getElementById('ws-status').style.display = 'none';
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'typing') {
        if (data.user_id !== userId) {
          document.getElementById('typing-indicator').textContent =
            data.is_typing ? 'En train d\'ecrire...' : '';
        }
      } else if (data.type === 'message') {
        if (data.expediteur_id !== userId) {
          afficherMessage(data.contenu, false, data.expediteur_nom, data.timestamp);
        }
      }
    };

    ws.onerror = () => {};

    ws.onclose = () => {
      const wsStatus = document.getElementById('ws-status');
      wsStatus.style.display = 'flex';
      setTimeout(() => { if (token) ouvrirWebSocket(); }, 3000);
    };
  }

  function afficherMessage(contenu, estMoi, nom, timestamp) {
    const container = document.getElementById('messages');
    const empty = container.querySelector('[style*="Aucun message"]');
    if (empty) empty.remove();

    const group = document.createElement('div');
    group.className = `msg-group ${estMoi ? 'moi' : 'autre'}`;

    if (!estMoi) {
      const sender = document.createElement('div');
      sender.className = 'msg-sender';
      sender.textContent = nom || 'Agent';
      group.appendChild(sender);
    }

    const bubble = document.createElement('div');
    bubble.className = `message ${estMoi ? 'moi' : 'autre'}`;
    bubble.textContent = contenu;
    group.appendChild(bubble);

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = timestamp
      ? new Date(timestamp).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
      : '';
    group.appendChild(time);

    container.appendChild(group);
    container.scrollTop = container.scrollHeight;
  }

  function envoyerMessage() {
    const input = document.getElementById('msg-input');
    const contenu = input.value.trim();
    if (!contenu) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({ type: 'message', contenu, user_id: userId }));
    afficherMessage(contenu, true, 'Vous', new Date().toISOString());
    input.value = '';

    clearTimeout(typingTimeout);
    ws.send(JSON.stringify({ type: 'typing', user_id: userId, is_typing: false }));
  }

  function handleKey(event) {
    if (event.key === 'Enter') { envoyerMessage(); return; }
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'typing', user_id: userId, is_typing: true }));
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'typing', user_id: userId, is_typing: false }));
    }, 2000);
  }
</script>

</body>
</html>
